name: Daily X Auto-Post (Autonomous)

on:
  schedule:
    # 14:00 UTC = 19:30 IST — prime time for US East Coast morning audience
    # To also catch US West Coast morning, add a second cron at 16:00 UTC (21:30 IST)
    - cron: '0 14 * * *'
  workflow_dispatch: {} # manual trigger from Actions tab (for testing)

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy requests

      - name: Generate and post tweet
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python autonomous_poster.py

      - name: Commit post log
        run: |
          git config user.name "auto-poster-bot"
          git config user.email "actions@github.com"
          git add post_log.txt
          git diff --quiet --cached || git commit -m "Log post [skip ci]"
          git push
